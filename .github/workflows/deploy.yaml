name: Deploy to Cloud Run

on:
  push:
    branches: [ main ] # main 브랜치에 push될 때 실행

# 동일한 워크플로우가 실행 중이면 이전 작업은 자동 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. GCP 인증 (Secrets에 저장한 JSON 키 사용)
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # 2. gcloud SDK 설정
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # 3. Docker 인증 및 빌드/푸시
      - name: Build and Push Container
        run: |-
          gcloud auth configure-docker asia-northeast3-docker.pkg.dev
          docker build -t asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/apps/backend:${{ github.sha }} .
          docker push asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/apps/backend:${{ github.sha }}

      # 4. Cloud Run 배포
      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy backend \
            --image asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/apps/backend:${{ github.sha }} \
            --region asia-northeast3 \
            --platform managed \
            --port ${{ secrets.APP_PORT }} \
            --set-env-vars "^|^APP_PORT=${{ secrets.APP_PORT }}|APP_ENV=${{ secrets.APP_ENV }}|DB_PORT=${{ secrets.DB_PORT }}|WEB_PORT=${{ secrets.WEB_PORT }}|HF_TOKEN=${{ secrets.HF_TOKEN }}|OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}|FIREBASE_SERVICE_ACCOUNT_JSON=${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" \
            --allow-unauthenticated